# skidd_blue starter configuration. Copy this file into an existing account's
# ~/.config/hypr/ directory when rebasing to receive these defaults.

$mainMod = SUPER

monitor = ,preferred,auto,1

exec-once = hyprpolkitagent
exec-once = noctalia

input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = false
    }
}

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    layout = dwindle
}

decoration {
    rounding = 12
    blur {
        enabled = true
        size = 3
        passes = 2
        vibrancy = 0.16
    }
}

animations {
    enabled = true
}

bind = $mainMod, RETURN, exec, ghostty
bind = $mainMod, SPACE, exec, noctalia msg panel-toggle launcher
bind = $mainMod, S, exec, noctalia msg panel-toggle control-center
bind = $mainMod, C, killactive
bind = $mainMod, V, togglefloating
bind = $mainMod, F, fullscreen
bind = $mainMod, M, exit
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bindel = ,XF86AudioRaiseVolume, exec, noctalia msg volume-up
bindel = ,XF86AudioLowerVolume, exec, noctalia msg volume-down
bindl = ,XF86AudioMute, exec, noctalia msg volume-mute
bindel = ,XF86MonBrightnessUp, exec, noctalia msg brightness-up
bindel = ,XF86MonBrightnessDown, exec, noctalia msg brightness-down

windowrule = float, match:class dev.noctalia.Noctalia
windowrule = size 1080 920, match:class dev.noctalia.Noctalia
layerrule = noanim, ^noctalia-(bar-.+|notification|dock|panel|attached-panel|osd)$
layerrule = ignorealpha 0.5, ^noctalia-(bar-.+|notification|dock|panel|attached-panel|osd)$
layerrule = blur, ^noctalia-(bar-.+|notification|dock|panel|attached-panel|osd)$
